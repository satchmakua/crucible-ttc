# The search ladder at matched compute, offline (the synthetic stepwise task).
#   crucible sweep configs/beam-sweep.yaml
#
# Each problem needs a 5-step chain where every step is good (p=0.6 per step, so only
# ~8% of full samples are all-good). best-of-N must pay for that exponentially; beam and
# MCTS, guided by the step PRM, prune bad partials and assemble a good chain cheaply — so
# on the accuracy-vs-compute curve beam sits well above best-of-N at matched tokens.
#
# Honest caveat: on THIS easy, shallow task MCTS is the *most expensive* method — it
# saturates to 100% but only at higher compute than beam (tree-search overhead). MCTS's
# adaptive allocation only pays off on harder/deeper trees with rare good steps; that's a
# real-model result, not something this toy reproduces. We plot it to show the full
# ladder and to keep the comparison honest, not to claim MCTS wins here.
dataset: sample
seed: 0
prm: step
step_accuracy: 0.6
step_depth: 5
step_prm_accuracy: 0.95
policy:
  backend: stepwise
  model: sim

grid:
  - method: pass1
  - method: best_of_n
    selection: prm
    n: [4, 8, 16, 32, 64]
  - method: beam
    beam_expansions: 4
    max_steps: 8
    beam_width: [1, 2, 4, 8]
  - method: mcts
    beam_expansions: 4
    max_steps: 8
    budget_tokens: [2000, 4000, 6000, 8000]

output_dir: runs
